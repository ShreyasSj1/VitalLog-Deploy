<!DOCTYPE html>
<html>
<head>
    <title>Food Tracker</title>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Simple JS for OTHERS toggle -->
    <script>
        function toggleOthers(select) {
            const othersBox = document.getElementById("others-box");
            if (select.value === "OTHERS") {
                othersBox.style.display = "block";
            } else {
                othersBox.style.display = "none";
            }
        }
    </script>
</head>

<body>

<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/sleep">Sleep</a>
    <a href="/wellbeing">Well-being</a>
    <a href="/report">Report</a>

    <button id="themeToggle" class="theme-toggle">🌙 Dark</button>
</div>


<div class="container">

    <!-- Date Navigation -->
    <div class="date-control">
    <form method="get" action="/food">
        <input
            type="date"
            name="date"
            value="{{ selected_date }}"
            onchange="this.form.submit()"
        >
    </form>

    <a href="/food" class="today-pill">Today</a>
    </div>



    <!-- Add Food -->
    <div class="card">
        <h2>Add Food</h2>

        <form method="post">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <!-- Meal -->
            <label>Meal</label>
            <select name="meal" required>
                {% for meal in food_data.keys() %}
                <option value="{{ meal }}">{{ meal }}</option>
                {% endfor %}
            </select>

            <!-- Food Item -->
            <label>Food Item</label>
            <select name="food" required onchange="toggleOthers(this)">
                {% for meal, items in food_data.items() %}
                    <optgroup label="{{ meal }}">
                        {% for item in items %}
                        <option value="{{ item }}">{{ item }}</option>
                        {% endfor %}
                    </optgroup>
                {% endfor %}
                <option value="OTHERS">OTHERS</option>
            </select>

            <!-- Quantity -->
            <label>Quantity</label>
            <input type="number" step="0.5" name="qty" value="1">

            <!-- OTHERS INPUTS (HIDDEN BY DEFAULT) -->
            <div id="others-box" style="display:none; margin-top:15px;">
                <label>Food Name</label>
                <input name="other_name" placeholder="Enter food name">

                <label>Calories</label>
                <input type="number" name="other_cal" placeholder="Calories">

                <label>Protein (g)</label>
                <input type="number" name="other_protein" placeholder="Protein">

                <label>Fat (g)</label>
                <input type="number" name="other_fat" placeholder="Fat">

                <label>Sugar (g)</label>
                <input type="number" name="other_sugar" placeholder="Sugar">
            </div>

            <button class="primary-btn">Add Food</button>
        </form>
    </div>

    <!-- Logged Food -->
    <div class="card">
        <h2>Logged Food</h2>

        {% if food_logs %}
        <table>
            <tr>
                <th>Meal</th>
                <th>Food</th>
                <th>Qty</th>
                <th>Calories</th>
                <th>Actions</th>
            </tr>

            {% for f in food_logs %}
            <tr>
                <td>{{ f.meal }}</td>
                <td>{{ f.food }}</td>
                <td>{{ f.qty }}</td>
                <td>{{ f.calories }}</td>
                <td class="actions">
                    <a href="/food/edit/{{ f.id }}"
                    class="icon-btn edit"
                    title="Edit">
                    ✏️
                    </a>

                    <a href="/food/delete/{{ f.id }}?date={{ selected_date }}"
                    class="icon-btn delete"
                    title="Delete"
                    onclick="return confirm('Delete this item?')">
                    🗑️
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>No food logged for this date 🍽️</p>
        {% endif %}
    </div>

</div>

<script>
    const toggle = document.getElementById("themeToggle");

    // Load saved theme
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        toggle.textContent = "☀️ Light";
    }

    toggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            localStorage.setItem("theme", "dark");
            toggle.textContent = "☀️ Light";
        } else {
            localStorage.setItem("theme", "light");
            toggle.textContent = "🌙 Dark";
        }
    });
</script>

</body>
</html>
