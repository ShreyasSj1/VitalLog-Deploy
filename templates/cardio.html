<!DOCTYPE html>
<html>
<head>
    <title>Log Cardio</title>
</head>
<body>
<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/report">Report</a>
</div>

<h1>Log Cardio / Non-Gym Activity</h1>

<form method="POST">

    <label>Activity:</label><br>
    <select name="activity" required>
        <option>Walking</option>
        <option>Running</option>
        <option>Cycling</option>
        <option>Jump Rope</option>
        <option>Core / Abs Circuit</option>
    </select>
    <br><br>

    <label>Duration (minutes):</label><br>
    <input type="number" step="0.5" name="minutes" required>
    <br><br>

    <label>Calories Burned:</label><br>
    <input type="number" step="0.5" name="calories" required>
    <br><br>

    <button type="submit">Add Cardio</button>

</form>

<hr>
<a href="/">Back to Dashboard</a>

</body>
</html>
