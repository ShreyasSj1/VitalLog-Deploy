<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Tracker</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/sleep" class="active">Sleep</a>
    <a href="/wellbeing">Well-being</a>
    <a href="/report">Report</a>
</div>

<div class="page-container">

    <!-- DATE CONTROL -->
    <div class="date-control">
        <form method="get" action="/sleep" class="date-form">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
            >
        </form>

        <a href="/sleep" class="today-pill">📅 Today</a>
    </div>

    <!-- SLEEP FORM -->
    <div class="card">
        <h2>Sleep Log</h2>

        <form method="post">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <div class="form-row">
                <label>Sleep Duration (hours)</label>
                <input
                    type="number"
                    name="hours"
                    step="0.1"
                    min="0"
                    placeholder="e.g. 7.5"
                    value="{{ sleep.hours if sleep }}"
                    required
                >
            </div>

            <div class="form-row">
                <label>Sleep Quality</label>
                <select name="quality" required>
                    <option value="">Select</option>
                    {% for i in range(1, 6) %}
                        <option value="{{ i }}"
                            {% if sleep and sleep.quality == i %}selected{% endif %}
                        >
                            {{ i }} ⭐
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Notes (optional)</label>
                <textarea
                    name="notes"
                    rows="4"
                    placeholder="How did you sleep?"
                >{{ sleep.notes if sleep }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    💾 Save Sleep
                </button>

                {% if sleep %}
                <a href="/sleep/delete?date={{ selected_date }}"
                   class="secondary-btn danger">
                    🗑 Delete
                </a>
                {% endif %}
            </div>

        </form>
    </div>

    <!-- SLEEP SUMMARY -->
    {% if sleep %}
    <div class="card">
        <h3>Sleep Summary</h3>

        <p><strong>Duration:</strong> {{ sleep.hours }} hrs</p>
        <ps></s>
        <p><strong>Quality:</strong> {{ sleep.quality }} ⭐</p>

        {% if sleep.notes %}
            <p><strong>Notes:</strong> {{ sleep.notes }}</p>
        {% endif %}
    </div>
    {% endif %}

</div>

</body>
</html>
