<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/sleep" class="active">Sleep</a>
    <a href="/wellbeing">Well-being</a>
    <a href="/report">Report</a>

    <button id="themeToggle" class="theme-toggle">🌙 Dark</button>
</div>

<!-- ================= PAGE WRAPPER ================= -->
<div class="page-wrapper">

    <!-- ================= DATE CONTROLS ================= -->
    <div class="date-control">
        <form method="get" action="/sleep">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
            >
        </form>

        <a href="/sleep" class="today-pill">📅 Today</a>
    </div>

    <!-- ================= SLEEP FORM ================= -->
    <div class="card sleep-card">
        <h2>Sleep Tracker</h2>

        <form method="post">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <label>Sleep Duration (hours)</label>
            <input
                type="number"
                step="0.1"
                name="hours"
                placeholder="e.g. 7.5"
                value="{{ sleep.hours if sleep }}"
                required
            >

            <label>Sleep Quality</label>
            <select name="quality" required>
                <option value="">Select</option>
                {% for i in range(1,6) %}
                    <option value="{{ i }}"
                        {% if sleep and sleep.quality == i %}selected{% endif %}
                    >
                        {{ i }} ⭐
                    </option>
                {% endfor %}
            </select>

            <label>Notes (optional)</label>
            <textarea
                name="notes"
                placeholder="How did you sleep?"
            >{{ sleep.notes if sleep }}</textarea>

            <button class="primary-btn" type="submit">
                💾 Save Sleep
            </button>
        </form>
    </div>

    <!-- ================= SLEEP LOG ================= -->
    <div class="card sleep-log">
        <h3>Sleep Log</h3>

        {% if sleep %}
            <table class="log-table">
                <thead>
                    <tr>
                        <th>Hours</th>
                        <th>Quality</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>{{ sleep.hours }}</td>
                        <td>{{ sleep.quality }} ⭐</td>
                        <td>{{ sleep.notes or "—" }}</td>
                        <td>
                            <a
                                href="/sleep/delete?date={{ selected_date }}"
                                class="icon-btn danger"
                            >🗑</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        {% else %}
            <p class="empty-state">No sleep logged for this date 😴</p>
        {% endif %}
    </div>

</div>

<!-- ================= THEME SCRIPT ================= -->
<script>
    const toggleBtn = document.getElementById("themeToggle");
    const body = document.body;

    if (localStorage.getItem("theme") === "dark") {
        body.classList.add("dark");
        toggleBtn.innerText = "☀️ Light";
    }

    toggleBtn.addEventListener("click", () => {
        body.classList.toggle("dark");
        const isDark = body.classList.contains("dark");
        toggleBtn.innerText = isDark ? "☀️ Light" : "🌙 Dark";
        localStorage.setItem("theme", isDark ? "dark" : "light");
    });
</script>

</body>
</html>
