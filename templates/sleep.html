<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Tracker</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <a href="/">Dashboard</a>
        <a href="/food">Food</a>
        <a href="/sleep">Sleep</a>
        <a href="/wellbeing">Well-being</a>
        <a href="/report">Report</a>
    </div>

    <button id="themeToggle" class="theme-btn">🌙 Dark</button>
</div>

<div class="page-container">

    <!-- DATE CONTROL -->
    <div class="date-control">
        <form method="get" class="date-form">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
                class="date-input"
            >
        </form>

        <a href="/sleep" class="today-btn">📅 Today</a>
    </div>

    <!-- SLEEP FORM -->
    <div class="card">
        <h2>Sleep Log</h2>

        <form method="post">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <div class="form-row">
                <label>Sleep Duration (hours)</label>
                <input
                    type="number"
                    name="hours"
                    step="0.1"
                    min="0"
                    placeholder="e.g. 7.5"
                    required
                >
            </div>

            <div class="form-row">
                <label>Sleep Quality</label>
                <select name="quality" required>
                    <option value="">Select</option>
                    {% for i in range(1, 6) %}
                        <option value="{{ i }}">{{ i }} ⭐</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Notes (optional)</label>
                <textarea
                    name="notes"
                    rows="4"
                    placeholder="How did you sleep?"
                ></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    💾 Save Sleep
                </button>
            </div>
        </form>
    </div>

    <!-- SLEEP SUMMARY -->
    {% if sleep %}
    <div class="card sleep-summary">
        <div class="summary-left">
            <h3>Sleep Summary</h3>
            <p><strong>Duration:</strong> {{ sleep.hours }} hrs</p>
            <p><strong>Quality:</strong> {{ sleep.quality }} ⭐</p>

            {% if sleep.notes %}
                <p><strong>Notes:</strong> {{ sleep.notes }}</p>
            {% endif %}
        </div>

        <div class="summary-right">
            <a href="/sleep/delete?date={{ selected_date }}"
               class="icon-btn danger"
               title="Delete Sleep Log">
                🗑
            </a>
        </div>
    </div>
    {% endif %}

</div>

<!-- THEME SCRIPT -->
<script>
const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    toggleBtn.innerText = "☀️ Light";
}

toggleBtn.addEventListener("click", () => {
    document.body.classList.add("theme-switching");

    setTimeout(() => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        toggleBtn.innerText = isDark ? "☀️ Light" : "🌙 Dark";
        document.body.classList.remove("theme-switching");
    }, 150);
});
</script>

</body>
</html>
