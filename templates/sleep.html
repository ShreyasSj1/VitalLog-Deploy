<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Log</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-left" id="navMenu">
        <a href="/">Dashboard</a>
        <a href="/food">Food</a>
        <a href="/sleep" class="active">Sleep</a>
        <a href="/wellbeing">Well-being</a>
        <a href="/gym">Gym</a>
        <a href="/report">Report</a>
    </div>

    <button id="themeToggle" class="theme-btn">🌙 Dark</button>
    <button class="menu-toggle" id="menuToggle">☰</button>
</nav>

<div class="page-container">

    <!-- DATE CONTROL -->
    <div class="date-control">
        <form method="get">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
                class="date-input"
            >
        </form>

        <a href="/sleep" class="today-btn">Today</a>
    </div>

    <!-- SLEEP FORM -->
    <div class="card">
        <h2>Sleep Log</h2>

        <form method="post">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <div class="form-row">
                <label>Sleep Duration (hours)</label>
                <input
                    type="number"
                    name="hours"
                    step="0.1"
                    min="0"
                    placeholder="e.g. 7.5"
                    required
                >
            </div>

            <div class="form-row">
                <label>Sleep Quality</label>
                <select name="quality" required>
                    <option value="">Select</option>
                    {% for i in range(1, 6) %}
                        <option value="{{ i }}">{{ i }} ⭐</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Notes (optional)</label>
                <textarea
                    name="notes"
                    rows="4"
                    placeholder="How did you sleep?"
                ></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    💾 Save Sleep
                </button>
            </div>
        </form>
    </div>

    <!-- SLEEP SUMMARY -->
    {% if sleep %}
    <div class="card sleep-summary">
        <div class="summary-left">
            <h3>Sleep Summary</h3>
            <p><strong>Duration:</strong> {{ sleep.hours }} hrs</p>
            <p><strong>Quality:</strong> {{ sleep.quality }} ⭐</p>

            {% if sleep.notes %}
                <p><strong>Notes:</strong> {{ sleep.notes }}</p>
            {% endif %}
        </div>

        <div class="summary-right">
            <a href="/sleep/delete?date={{ selected_date }}"
               class="icon-btn danger"
               title="Delete Sleep Log"
               onclick="return confirm('Delete sleep log for this date?')">
                🗑
            </a>
        </div>
    </div>
    {% endif %}

</div>

<!-- THEME SCRIPT -->
<script>
const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    toggleBtn.innerText = "☀️ Light";
}

toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
    toggleBtn.innerText = isDark ? "☀️ Light" : "🌙 Dark";
});
</script>

<script>
const menuToggle = document.getElementById("menuToggle");
const navMenu = document.getElementById("navMenu");

menuToggle.addEventListener("click", () => {
    navMenu.classList.toggle("active");
    menuToggle.innerText = navMenu.classList.contains("active") ? "✕" : "☰";
});

document.addEventListener("click", (e) => {
    if (!navMenu.contains(e.target) && !menuToggle.contains(e.target)) {
        navMenu.classList.remove("active");
        menuToggle.innerText = "☰";
    }
});
</script>

</body>
</html>
