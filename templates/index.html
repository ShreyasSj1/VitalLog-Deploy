<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/" class="active">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/sleep">Sleep</a>
    <a href="/wellbeing">Well-being</a>
    <a href="/report">Report</a>
</div>

<div class="page-container">

    <!-- DATE CONTROL -->
    <div class="date-control">
        <form method="get" action="/" class="date-form">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
            >
        </form>

        <a href="/" class="today-pill">📅 Today</a>
    </div>

    <!-- DAILY OVERVIEW -->
    <div class="card">
        <h2>Daily Overview</h2>

        <div class="stats-grid">
            <div class="stat-box">
                <p>Calories</p>
                <h3>{{ t.cal or 0 }}</h3>
            </div>

            <div class="stat-box">
                <p>Protein (g)</p>
                <h3>{{ t.protein or 0 }}</h3>
            </div>

            <div class="stat-box">
                <p>Fat (g)</p>
                <h3>{{ t.fat or 0 }}</h3>
            </div>

            <div class="stat-box">
                <p>Sugar (g)</p>
                <h3>{{ t.sugar or 0 }}</h3>
            </div>
        </div>
    </div>

    <!-- WEEKLY CHARTS -->
    <div class="card">
        <h2>Weekly Trends</h2>

        <div class="chart-grid">
            <div>
                <h4>Calories</h4>
                <canvas id="calorieChart"></canvas>
            </div>

            <div>
                <h4>Sleep (hrs)</h4>
                <canvas id="sleepChart"></canvas>
            </div>

            <div>
                <h4>Well-being (min)</h4>
                <canvas id="wellbeingChart"></canvas>
            </div>
        </div>
    </div>

</div>

<!-- ================= CHART SCRIPTS ================= -->
<script>
const labels = {{ week | tojson }};

// Calories Chart
new Chart(document.getElementById("calorieChart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Calories",
            data: {{ weekly_cal | tojson }},
            backgroundColor: "#4f6cff"
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
    }
});

// Sleep Chart
new Chart(document.getElementById("sleepChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Sleep (hrs)",
            data: {{ weekly_sleep | tojson }},
            borderColor: "#22c55e",
            tension: 0.4,
            spanGaps: true
        }]
    },
    options: {
        responsive: true,
        scales: { y: { beginAtZero: true, max: 10 } }
    }
});

// Well-being Chart
new Chart(document.getElementById("wellbeingChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Well-being (min)",
            data: {{ weekly_wellbeing | tojson }},
            borderColor: "#facc15",
            tension: 0.4,
            spanGaps: true
        }]
    },
    options: {
        responsive: true,
        scales: { y: { beginAtZero: true } }
    }
});
</script>

</body>
</html>
