<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% include "_navbar.html" %}

<div class="page-container">
    {% include "_flash_messages.html" %}

    <div class="card profile-card">
        <h2>Personal Information</h2>
        <p class="profile-copy">Keep your basics up to date so your fitness journey stays personal and easy to track.</p>

        <form method="post" class="profile-form">
            <div class="form-row">
                <label>Name</label>
                <input type="text" name="name" value="{{ profile.name or '' }}" autocomplete="name" required>
            </div>

            <div class="form-row">
                <label>Email</label>
                <input type="email" value="{{ profile.email }}" disabled>
                <small class="profile-help">Your email is locked after registration.</small>
            </div>

            <div class="profile-grid">
                <div class="form-row">
                    <label>Age</label>
                    <input type="number" name="age" min="0" step="1" value="{{ profile.age if profile.age is not none else '' }}" placeholder="Optional">
                </div>

                <div class="form-row">
                    <label>Height (cm)</label>
                    <input type="number" name="height" min="0" step="0.1" value="{{ profile.height if profile.height is not none else '' }}" placeholder="Optional">
                </div>

                <div class="form-row">
                    <label>Weight (kg)</label>
                    <input type="number" name="weight" min="0" step="0.1" value="{{ profile.weight if profile.weight is not none else '' }}" placeholder="Optional">
                </div>
            </div>

            <button type="submit" class="primary-btn">Save Details</button>
        </form>

        <form method="post" action="{{ url_for('logout') }}" class="profile-logout-form">
            <button type="submit" class="secondary-btn profile-logout-btn">Log out</button>
        </form>
    </div>
</div>

</body>
</html>
