<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-shell">
        <div class="login-card">
            <p class="eyebrow">Fitness Tracker</p>
            <h1>Reset your password.</h1>
            <p class="login-copy">
                Enter your email address and the app will generate a reset link. For now, that link is printed to the server console for local development.
            </p>

            {% include "_flash_messages.html" %}

            <form id="forgot-form" class="auth-form">
                <div class="form-row">
                    <label>Email</label>
                    <input type="email" name="email" required autocomplete="email">
                </div>

                <button type="submit" class="primary-btn login-btn">Generate Reset Link</button>
            </form>

            <p class="auth-switch">
                <a href="{{ url_for('auth.login') }}">Back to sign in</a>
            </p>
        </div>
    </div>

    <script>
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "{{ firebase_api_key }}",
            authDomain: "{{ firebase_auth_domain }}",
            projectId: "{{ firebase_project_id }}"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function showError(msg, isSuccess = false) {
            let stack = document.querySelector('.flash-stack');
            if (!stack) {
                stack = document.createElement('div');
                stack.className = 'flash-stack';
                const copy = document.querySelector('.login-copy');
                copy.parentNode.insertBefore(stack, copy.nextSibling);
            }
            
            let friendlyMsg = msg;
            if (msg.includes('user-not-found')) {
                friendlyMsg = "No account found with this email.";
            } else if (msg.includes('invalid-email')) {
                friendlyMsg = "Please enter a valid email address.";
            }
            
            stack.innerHTML = `<div class="flash-message" style="${isSuccess ? 'background-color: var(--success);' : ''}">${friendlyMsg}</div>`;
        }

        const form = document.getElementById('forgot-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = form.email.value;
            const btn = form.querySelector('button[type="submit"]');
            
            try {
                btn.disabled = true;
                btn.textContent = "Sending...";
                await sendPasswordResetEmail(auth, email);
                showError("Password reset email sent! Check your inbox.", true);
                setTimeout(() => {
                    window.location.href = "{{ url_for('auth.login') }}";
                }, 2000);
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = "Generate Reset Link";
            }
        });
    </script>
</body>
</html>
