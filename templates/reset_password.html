<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-shell">
        <div class="login-card">
            <p class="eyebrow">Fitness Tracker</p>
            <h1>Choose a new password.</h1>
            <p class="login-copy">
                This reset link expires after 30 minutes and can only be used once.
            </p>

            {% include "_flash_messages.html" %}

            <form method="post" class="auth-form">
                <div class="form-row">
                    <label>New Password</label>
                    <input type="password" name="password" required autocomplete="new-password">
                </div>

                <div class="form-row">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required autocomplete="new-password">
                </div>

                <button type="submit" class="primary-btn login-btn">Update Password</button>
            </form>

            <p class="auth-switch">
                <a href="{{ url_for('login') }}">Back to sign in</a>
            </p>
        </div>
    </div>

    <script>
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
    </script>
</body>
</html>
