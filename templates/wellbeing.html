<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well-being Log</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-left" id="navMenu">
        <a href="/">Dashboard</a>
        <a href="/food">Food</a>
        <a href="/sleep">Sleep</a>
        <a href="/wellbeing" class="active">Well-being</a>
        <a href="/gym">Gym</a>
        <a href="/report">Report</a>
    </div>

    <button id="themeToggle" class="theme-btn">🌙 Dark</button>
    <button class="menu-toggle" id="menuToggle">☰</button>
</nav>

<div class="page-container">

    <!-- DATE CONTROL -->
    <div class="date-control">
        <form method="get">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
                class="date-input"
            >
        </form>

        <a href="/wellbeing" class="today-btn">Today</a>
    </div>

    <!-- ADD ACTIVITY -->
    <div class="card">
        <h2>Add Well-being Activity</h2>

        <form method="post">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <div class="form-row">
                <label>Activity</label>
                <select name="activity" id="activitySelect" required onchange="toggleOtherActivity()">
                    <option value="">Select Activity</option>
                    <option value="Meditation">Meditation</option>
                    <option value="Yoga">Yoga</option>
                    <option value="Reading">Reading</option>
                    <option value="Stretching">Stretching</option>
                    <option value="Journaling">Journaling</option>
                    <option value="Music / Relaxation">Music / Relaxation</option>
                    <option value="OTHERS">OTHERS</option>
                </select>
            </div>

            <!-- OTHERS INPUT -->
            <div class="form-row" id="otherActivityBox" style="display:none;">
                <label>Custom Activity</label>
                <input type="text" name="other_activity" placeholder="Enter activity name">
            </div>

            <div class="form-row">
                <label>Time Spent (minutes)</label>
                <input
                    type="number"
                    name="minutes"
                    min="1"
                    placeholder="e.g. 20"
                    required
                >
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    ➕ Add Activity
                </button>
            </div>
        </form>
    </div>

    <!-- LOGGED ACTIVITIES -->
    <div class="card">
        <h2>Logged Activities</h2>

        {% if wellbeing_logs %}
        <div class="table-wrapper">
        <table class="log-table">
            <thead>
                <tr>
                    <th>Activity</th>
                    <th>Minutes</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for w in wellbeing_logs %}
                <tr>
                    <td>{{ w.activity }}</td>
                    <td>{{ w.minutes }}</td>
                    <td class="action-cell">
                        <a href="/wellbeing/delete/{{ w.id }}?date={{ selected_date }}"
                           class="action-btn delete-btn"
                           title="Delete"
                           onclick="return confirm('Delete this activity?')">
                            🗑
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
        {% else %}
            <p class="empty-state">No well-being activities logged 🌱</p>
        {% endif %}
    </div>

</div>

<!-- ================= JS ================= -->
<script>
function toggleOtherActivity() {
    const activity = document.getElementById("activitySelect").value;
    const box = document.getElementById("otherActivityBox");
    box.style.display = activity === "OTHERS" ? "block" : "none";
}
</script>

<!-- THEME SCRIPT -->
<script>
const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    toggleBtn.innerText = "☀️ Light";
}

toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
    toggleBtn.innerText = isDark ? "☀️ Light" : "🌙 Dark";
});
</script>

<script>
const menuToggleElement = document.getElementById("menuToggle");
const navMenuElement = document.getElementById("navMenu");

menuToggleElement.addEventListener("click", () => {
    navMenuElement.classList.toggle("active");
    menuToggleElement.innerText = navMenuElement.classList.contains("active") ? "✕" : "☰";
});

document.addEventListener("click", (e) => {
    if (!navMenuElement.contains(e.target) && !menuToggleElement.contains(e.target)) {
        navMenuElement.classList.remove("active");
        menuToggleElement.innerText = "☰";
    }
});
</script>

</body>
</html>
