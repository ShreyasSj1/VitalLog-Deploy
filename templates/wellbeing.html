<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Well-being Tracker</title>
    <link rel="stylesheet" href="/static/style.css">

    <script>
        function toggleOtherActivity(select) {
            const box = document.getElementById("other-activity-box");
            box.style.display = select.value === "OTHERS" ? "block" : "none";
        }
    </script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/sleep">Sleep</a>
    <a href="/wellbeing">Well-being</a>
    <a href="/report">Report</a>

    <button id="themeToggle" class="theme-toggle">🌙 Dark</button>
</div>

<div class="container">

    <!-- Date Navigation -->
    <div class="date-control">
        <form method="get" action="/wellbeing">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
            >
        </form>

        <a href="/wellbeing" class="today-pill">Today</a>
    </div>

    <!-- Add Well-being -->
    <div class="card">
        <h2>Well-being Tracker</h2>

        <form method="post">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <label>Activity</label>
            <select name="activity" onchange="toggleOtherActivity(this)" required>
                <option value="">Select</option>
                <option>Meditation</option>
                <option>Reading</option>
                <option>Music</option>
                <option>Hobbies</option>
                <option>Relaxing / Me-time</option>
                <option value="OTHERS">OTHERS</option>
            </select>

            <div id="other-activity-box" style="display:none;">
                <label>Custom Activity</label>
                <input name="other_activity" placeholder="Enter activity name">
            </div>

            <label>Time Spent (minutes)</label>
            <input
                type="number"
                name="minutes"
                placeholder="e.g. 30"
                required
            >

            <div class="form-actions">
                <button class="primary-btn">Add Activity</button>
            </div>
        </form>
    </div>

    <!-- Logged Activities -->
    <div class="card">
        <h2>Logged Activities</h2>

        {% if wellbeing_logs %}
        <table>
            <tr>
                <th>Activity</th>
                <th>Minutes</th>
                <th>Action</th>
            </tr>

            {% for w in wellbeing_logs %}
            <tr>
                <td>{{ w.activity }}</td>
                <td>{{ w.minutes }}</td>
                <td class="actions">
                    <a
                        href="/wellbeing/delete/{{ w.id }}?date={{ selected_date }}"
                        class="icon-btn delete"
                        onclick="return confirm('Delete this activity?')"
                    >
                        🗑️
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>No well-being activities logged for this date 🌱</p>
        {% endif %}
    </div>

</div>

<!-- DARK MODE SCRIPT -->
<script>
    const toggle = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        toggle.textContent = "☀️ Light";
    }

    toggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            localStorage.setItem("theme", "dark");
            toggle.textContent = "☀️ Light";
        } else {
            localStorage.setItem("theme", "light");
            toggle.textContent = "🌙 Dark";
        }
    });
</script>

</body>
</html>
