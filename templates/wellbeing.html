<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Well-being Tracker</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/sleep">Sleep</a>
    <a href="/wellbeing" class="active">Well-being</a>
    <a href="/report">Report</a>
</div>

<div class="page-container">

    <!-- DATE CONTROL -->
    <div class="date-control">
        <form method="get" action="/wellbeing" class="date-form">
            <input
                type="date"
                name="date"
                value="{{ selected_date }}"
                onchange="this.form.submit()"
            >
        </form>

        <a href="/wellbeing" class="today-pill">📅 Today</a>
    </div>

    <!-- ADD ACTIVITY -->
    <div class="card">
        <h2>Add Well-being Activity</h2>

        <form method="post" id="wellbeingForm">
            <input type="hidden" name="date" value="{{ selected_date }}">

            <div class="form-row">
                <label>Activity</label>
                <select name="activity" id="activitySelect" required onchange="toggleOtherActivity()">
                    <option value="">Select Activity</option>
                    <option value="Meditation">Meditation</option>
                    <option value="Yoga">Yoga</option>
                    <option value="Reading">Reading</option>
                    <option value="Stretching">Stretching</option>
                    <option value="Journaling">Journaling</option>
                    <option value="Music / Relaxation">Music / Relaxation</option>
                    <option value="OTHERS">OTHERS</option>
                </select>
            </div>

            <!-- OTHERS INPUT -->
            <div class="form-row" id="otherActivityBox" style="display:none;">
                <label>Custom Activity</label>
                <input type="text" name="other_activity" placeholder="Enter activity name">
            </div>

            <div class="form-row">
                <label>Time Spent (minutes)</label>
                <input
                    type="number"
                    name="minutes"
                    min="1"
                    placeholder="e.g. 20"
                    required
                >
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    ➕ Add Activity
                </button>
            </div>
        </form>
    </div>

    <!-- LOGGED ACTIVITIES -->
    <div class="card">
        <h2>Logged Activities</h2>

        {% if wellbeing_logs %}
        <table class="log-table">
            <thead>
                <tr>
                    <th>Activity</th>
                    <th>Minutes</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for w in wellbeing_logs %}
                <tr>
                    <td>{{ w.activity }}</td>
                    <td>{{ w.minutes }}</td>
                    <td>
                        <a href="/wellbeing/delete/{{ w.id }}"
                           class="icon-btn danger">
                            🗑
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
            <p class="empty-state">No well-being activities logged 🌱</p>
        {% endif %}
    </div>

</div>

<!-- ================= JS ================= -->
<script>
function toggleOtherActivity() {
    const activity = document.getElementById("activitySelect").value;
    const box = document.getElementById("otherActivityBox");

    box.style.display = activity === "OTHERS" ? "block" : "none";
}
</script>

</body>
</html>
