<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Food</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <a href="/food?date={{ f.date }}">← Back</a>
</div>

<!-- ===== PAGE CONTENT ===== -->
<div class="container">

    <div class="card">
        <h2>Edit {{ f.food }}</h2>

        <form method="post">

            <label>Quantity</label>
            <input
                type="number"
                step="0.5"
                name="qty"
                value="{{ f.qty }}"
                required
            >

            <label>Calories</label>
            <input
                type="number"
                name="calories"
                value="{{ f.calories }}"
                required
            >

            <label>Protein (g)</label>
            <input
                type="number"
                name="protein"
                value="{{ f.protein }}"
                required
            >

            <label>Fat (g)</label>
            <input
                type="number"
                name="fat"
                value="{{ f.fat }}"
                required
            >

            <label>Sugar (g)</label>
            <input
                type="number"
                name="sugar"
                value="{{ f.sugar }}"
                required
            >

            <!-- ===== ACTIONS ===== -->
            <div class="form-actions">
                <button type="submit" class="primary-btn save-btn">
                    Save Changes
                </button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
