<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Food</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% include "_navbar.html" %}

<div class="page-container">
    {% include "_flash_messages.html" %}

    <!-- EDIT CARD -->
    <div class="card">
        <h2>Edit Food Entry</h2>

        <form method="post">

            <div class="form-row">
                <label>Food Item</label>
                <input type="text" value="{{ f.food }}" disabled>
            </div>

            <div class="form-row">
                <label>Quantity</label>
                <input
                    type="number"
                    step="0.1"
                    name="qty"
                    id="qtyInput"
                    value="{{ f.qty }}"
                    min="0.1"
                    required
                >
                <small class="field-hint">Changing quantity rescales calories, protein, fat, and sugar from the original serving.</small>
            </div>

            <div class="form-row">
                <label>Calories</label>
                <input
                    type="number"
                    step="0.1"
                    name="calories"
                    id="caloriesInput"
                    value="{{ f.calories }}"
                    required
                >
            </div>

            <div class="form-row">
                <label>Protein (g)</label>
                <input
                    type="number"
                    step="0.1"
                    name="protein"
                    id="proteinInput"
                    value="{{ f.protein }}"
                    required
                >
            </div>

            <div class="form-row">
                <label>Fat (g)</label>
                <input
                    type="number"
                    step="0.1"
                    name="fat"
                    id="fatInput"
                    value="{{ f.fat }}"
                    required
                >
            </div>

            <div class="form-row">
                <label>Sugar (g)</label>
                <input
                    type="number"
                    step="0.1"
                    name="sugar"
                    id="sugarInput"
                    value="{{ f.sugar }}"
                    required
                >
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    💾 Save Changes
                </button>

                <a href="/food?date={{ f.date }}" class="secondary-btn">
                    Cancel
                </a>
            </div>

        </form>
    </div>

</div>

<script>
const qtyInput = document.getElementById("qtyInput");
const nutritionInputs = {
    calories: document.getElementById("caloriesInput"),
    protein: document.getElementById("proteinInput"),
    fat: document.getElementById("fatInput"),
    sugar: document.getElementById("sugarInput"),
};

const originalQty = parseFloat(qtyInput.value) || 1;
const perUnitNutrition = {
    calories: (parseFloat(nutritionInputs.calories.value) || 0) / originalQty,
    protein: (parseFloat(nutritionInputs.protein.value) || 0) / originalQty,
    fat: (parseFloat(nutritionInputs.fat.value) || 0) / originalQty,
    sugar: (parseFloat(nutritionInputs.sugar.value) || 0) / originalQty,
};

function roundNutrition(value) {
    return (Math.round(value * 100) / 100).toFixed(2).replace(/\.00$/, "").replace(/(\.\d)0$/, "$1");
}

qtyInput.addEventListener("input", () => {
    const qty = parseFloat(qtyInput.value);
    if (!(qty > 0)) return;

    Object.entries(nutritionInputs).forEach(([key, input]) => {
        input.value = roundNutrition(perUnitNutrition[key] * qty);
    });
});
</script>

</body>
</html>
