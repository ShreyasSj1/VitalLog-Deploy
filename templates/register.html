<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Transformation Starts Here</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body register-page">
    <div class="login-shell">
        <div class="login-card register-card">
            <p class="eyebrow">Fitness Tracker</p>
            <h1><span>Your transformation</span><span>starts here.</span></h1>
            <p class="login-copy">
                Everything you need to track your fitness, nutrition, and progress — all in one place. Stay focused. Stay in control.
            </p>

            {% include "_flash_messages.html" %}

            <form id="register-form" class="auth-form">
                <div class="form-row">
                    <label>Name</label>
                    <input type="text" name="name" autocomplete="name">
                </div>

                <div class="form-row">
                    <label>Email</label>
                    <input type="email" name="email" required autocomplete="email">
                </div>

                <div class="form-row">
                    <label>Password</label>
                    <input type="password" name="password" required autocomplete="new-password">
                </div>

                <div class="form-row">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required autocomplete="new-password">
                </div>

                <button type="submit" class="primary-btn login-btn">Create New Identity</button>
                <div style="text-align: center; margin: 15px 0; color: var(--text-muted); font-size: 0.9rem;">or</div>
                <button type="button" class="secondary-btn" id="google-login-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
            </p>
        </div>
    </div>

    <script>
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "{{ firebase_api_key }}",
            authDomain: "{{ firebase_auth_domain }}",
            projectId: "{{ firebase_project_id }}"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function showError(msg) {
            let stack = document.querySelector('.flash-stack');
            if (!stack) {
                stack = document.createElement('div');
                stack.className = 'flash-stack';
                const copy = document.querySelector('.login-copy');
                copy.parentNode.insertBefore(stack, copy.nextSibling);
            }
            
            // Map Firebase errors to human friendly messages
            let friendlyMsg = msg;
            if (msg.includes('email-already-in-use')) {
                friendlyMsg = "That email is already registered. Try signing in instead.";
            } else if (msg.includes('invalid-email')) {
                friendlyMsg = "Please enter a valid email address.";
            } else if (msg.includes('weak-password')) {
                friendlyMsg = "Password is too weak. Please use at least 6 characters.";
            } else if (msg.includes('popup-closed-by-user')) {
                friendlyMsg = "Google sign in was cancelled.";
            } else if (msg.includes('network-request-failed')) {
                friendlyMsg = "Network error. Please check your connection.";
            }
            
            stack.innerHTML = `<div class="flash-message">${friendlyMsg}</div>`;
        }

        const form = document.getElementById('register-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = form.name.value;
            const email = form.email.value;
            const password = form.password.value;
            const confirm_password = form.confirm_password.value;
            const btn = form.querySelector('button[type="submit"]');

            if (password !== confirm_password) {
                showError("Passwords do not match!");
                return;
            }
            
            try {
                btn.disabled = true;
                btn.textContent = "Creating Identity...";
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const idToken = await userCredential.user.getIdToken();
                
                const response = await fetch('/api/auth/firebase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: idToken, name: name })
                });
                
                if (response.ok) {
                    window.location.href = "{{ url_for('dashboard.index') }}";
                } else {
                    const data = await response.json();
                    showError("Server error: " + data.error);
                    btn.disabled = false;
                    btn.textContent = "Create New Identity";
                }
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = "Create New Identity";
            }
        });

        // Google Authentication
        const googleProvider = new GoogleAuthProvider();
        const googleBtn = document.getElementById('google-login-btn');
        googleBtn.addEventListener('click', async () => {
            try {
                googleBtn.disabled = true;
                const originalText = googleBtn.innerHTML;
                googleBtn.textContent = "Connecting to Google...";
                
                const userCredential = await signInWithPopup(auth, googleProvider);
                const idToken = await userCredential.user.getIdToken();
                
                const response = await fetch('/api/auth/firebase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        idToken: idToken,
                        name: userCredential.user.displayName 
                    })
                });
                
                if (response.ok) {
                    window.location.href = "{{ url_for('dashboard.index') }}";
                } else {
                    const data = await response.json();
                    showError("Server error: " + data.error);
                    googleBtn.disabled = false;
                    googleBtn.innerHTML = originalText;
                }
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError(error.message);
                }
                googleBtn.disabled = false;
                googleBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
