<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Transformation Starts Here</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body register-page">
    <div class="login-shell">
        <div class="login-card register-card">
            <p class="eyebrow">Fitness Tracker</p>
            <h1><span>Your transformation</span><span>starts here.</span></h1>
            <p class="login-copy">
                Everything you need to track your fitness, nutrition, and progress — all in one place. Stay focused. Stay in control.
            </p>

            {% include "_flash_messages.html" %}

            <form method="post" class="auth-form">
                <div class="form-row">
                    <label>Name</label>
                    <input type="text" name="name" autocomplete="name">
                </div>

                <div class="form-row">
                    <label>Email</label>
                    <input type="email" name="email" required autocomplete="email">
                </div>

                <div class="form-row">
                    <label>Password</label>
                    <input type="password" name="password" required autocomplete="new-password">
                </div>

                <div class="form-row">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required autocomplete="new-password">
                </div>

                <button type="submit" class="primary-btn login-btn">Create New Identity</button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            </p>
        </div>
    </div>

    <script>
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
    </script>
</body>
</html>
