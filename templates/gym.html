<!DOCTYPE html>
<html>
<head>
    <title>Log Gym Workout</title>
</head>
<body>
<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/food">Food</a>
    <a href="/report">Report</a>
</div>

<h1>Log Gym Workout</h1>

<form method="POST">
    <label>Muscle Group:</label><br>
    <select name="muscle" required>
        <option>Chest</option>
        <option>Back</option>
        <option>Biceps</option>
        <option>Triceps</option>
        <option>Shoulders</option>
        <option>Legs</option>
    </select>
    <br><br>

    <label>Sets:</label><br>
    <input type="number" name="sets" required>
    <br><br>

    <label>Reps:</label><br>
    <input type="number" name="reps" required>
    <br><br>

    <label>Weight (kg):</label><br>
    <input type="number" step="0.5" name="weight" value="0">
    <br><br>

    <label>Intensity:</label><br>
    <select name="intensity">
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
        <option>Extreme</option>
    </select>
    <br><br>

    <label>Duration (minutes):</label><br>
    <input type="number" step="0.5" name="duration" value="0">
    <br><br>

    <button type="submit">Add Gym Workout</button>
</form>

<hr>
<a href="/">Back to Dashboard</a>

</body>
</html>
